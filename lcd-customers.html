<!-- ═══════════════════════════════════════════════
     LCD CUSTOMERS — lcd-customers.html
     Inclure dans index.html via <div id="screen-lcd">
     ═══════════════════════════════════════════════ -->

<!-- SCREEN LCD LIST -->
<div class="screen" id="screen-lcd">
  <div class="search-bar">
    <input type="text" class="search-input" id="clientSearch" placeholder="Chèche kliyan..." oninput="LCD.renderClients()"/>
    <button class="btn-add" onclick="LCD.openAddClient()">+</button>
  </div>
  <div class="sort-bar">
    <button class="sort-chip active" id="sort-amount" onclick="LCD.setSort('amount',this)">💰 Pi aktif</button>
    <button class="sort-chip" id="sort-name"   onclick="LCD.setSort('name',this)">🔤 Non</button>
    <button class="sort-chip" id="sort-recent" onclick="LCD.setSort('recent',this)">🕐 Resan</button>
  </div>
  <div id="clientList"></div>
</div>

<!-- SCREEN CLIENT DETAIL -->
<div class="screen" id="screen-clientDetail">
  <div id="clientDetailContent"></div>
</div>

<!-- ADD/EDIT CLIENT MODAL -->
<div class="modal-backdrop" id="modalAddClient">
  <div class="modal-sheet">
    <div class="modal-title" id="modalClientTitle">NOUVO KLIYAN</div>
    <div class="field-group">
      <div class="field-label">Non Konplè *</div>
      <input class="field-input" id="fName" placeholder="Beauséjour Jephté"/>
    </div>
    <div class="field-group">
      <div class="field-label">Adrès</div>
      <input class="field-input" id="fAddr" placeholder="Cayes, Sud"/>
    </div>
    <div class="field-group">
      <div class="field-label">Telefòn</div>
      <input class="field-input" id="fPhone" placeholder="+509 34 52 1975" type="tel"/>
    </div>
    <div class="field-group">
      <div class="field-label">Email</div>
      <input class="field-input" id="fEmail" placeholder="client@email.com" type="email"/>
    </div>
    <div class="field-group">
      <div class="field-label">Byografi / Nòt</div>
      <textarea class="field-input field-textarea" id="fBio" placeholder="Yon ti deskripsyon..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modalAddClient')">Anile</button>
      <button class="btn-confirm" onclick="LCD.saveClient()">Anrejistre</button>
    </div>
  </div>
</div>

<!-- ADD TRANSACTION MODAL -->
<div class="modal-backdrop" id="modalAddTxn">
  <div class="modal-sheet">
    <div class="modal-title">NOUVO TRANZAKSYON</div>
    <div class="field-group">
      <div class="field-label">Dat</div>
      <input class="field-input" id="fTxnDate" type="date"/>
    </div>
    <div class="field-group">
      <div class="field-label">Deskripsyon</div>
      <input class="field-input" id="fTxnDesc" placeholder="Ex: 3 pakè, valiz..."/>
    </div>
    <div class="field-group">
      <div class="field-label">Montan ($)</div>
      <input class="field-input" id="fTxnAmount" type="number" placeholder="0.00"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modalAddTxn')">Anile</button>
      <button class="btn-confirm" onclick="LCD.saveTxn()">Anrejistre</button>
    </div>
  </div>
</div>

<!-- GROUP EMAIL MODAL -->
<div class="modal-backdrop" id="modalEmail">
  <div class="modal-sheet">
    <div class="modal-title">VOYE EMAIL GWOUP</div>
    <div class="field-group">
      <div class="field-label">Chwazi destinatè yo</div>
      <div class="email-chips" id="emailChips"></div>
    </div>
    <div class="field-group">
      <div class="field-label">Sijè</div>
      <input class="field-input" id="emailSubject" placeholder="Nouvo pakè disponib..."/>
    </div>
    <div class="field-group">
      <div class="field-label">Mesaj</div>
      <textarea class="field-input field-textarea" id="emailBody" style="min-height:100px" placeholder="Ekri mesaj ou..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modalEmail')">Anile</button>
      <button class="btn-confirm" onclick="LCD.sendGroupEmail()">📧 Voye</button>
    </div>
  </div>
</div>
