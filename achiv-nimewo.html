<!-- ═══════════════════════════════════════════════
     ACHIV NIMEWO — achiv-nimewo.html
     Kontè: profil WhatsApp, SMS, Appel
     ═══════════════════════════════════════════════ -->
<div class="screen" id="screen-achiv">

  <div class="achiv-search-bar">
    <input type="text" class="search-input" id="achivSearch"
           placeholder="Chèche non, nimewo..." oninput="ACHIV.render()"/>
    <button class="btn-add" onclick="ACHIV.openAdd()">+</button>
  </div>

  <div class="achiv-sort-bar">
    <button class="sort-chip active" id="achivSortName" onclick="ACHIV.setSort('name',this)">🔤 Non</button>
    <button class="sort-chip" id="achivSortRecent" onclick="ACHIV.setSort('recent',this)">🕐 Resan</button>
    <button class="sort-chip" id="achivSortGroup" onclick="ACHIV.setSort('group',this)">🏷 Gwoup</button>
  </div>

  <div id="achivList"></div>

</div>

<!-- CONTACT DETAIL SCREEN -->
<div class="screen" id="screen-achivDetail">
  <div id="achivDetailContent"></div>
</div>

<!-- ADD/EDIT CONTACT MODAL -->
<div class="modal-backdrop" id="modalAchiv">
  <div class="modal-sheet">
    <div class="modal-title" id="modalAchivTitle">NOUVO KONTAKT</div>
    <div class="field-group">
      <div class="field-label">Non Konplè *</div>
      <input class="field-input" id="aNom" placeholder="Marie Jean-Pierre"/>
    </div>
    <div class="field-group">
      <div class="field-label">Nimewo Telefòn * (ak kòd peyi)</div>
      <input class="field-input" id="aPhone" placeholder="+50934521975" type="tel"/>
    </div>
    <div class="field-group">
      <div class="field-label">Nimewo 2 (opsyonèl)</div>
      <input class="field-input" id="aPhone2" placeholder="+50934521976" type="tel"/>
    </div>
    <div class="field-group">
      <div class="field-label">Gwoup / Kategori</div>
      <input class="field-input" id="aGroup" placeholder="Kliyan, Fanmi, Zanmi, Biznis..."/>
    </div>
    <div class="field-group">
      <div class="field-label">Adrès</div>
      <input class="field-input" id="aAddr" placeholder="Cayes, Sud"/>
    </div>
    <div class="field-group">
      <div class="field-label">Nòt</div>
      <textarea class="field-input field-textarea" id="aNote" placeholder="Nòt sou kontakt sa..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modalAchiv')">Anile</button>
      <button class="btn-confirm" onclick="ACHIV.save()">Anrejistre</button>
    </div>
  </div>
</div>
