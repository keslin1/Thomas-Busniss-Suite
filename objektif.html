<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Plan d'action — Thomas Business</title>
  <link rel="stylesheet" href="main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ── */
    :root {
      --obj-radius: 12px;
      --obj-gap: 14px;
    }

    /* ── Layout ── */
    #objektifScreen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-dark, #0a0a0f);
      color: var(--text-primary, #e8e0d0);
      overflow: hidden;
    }

    .obj-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(80, 30, 120, 0.92);
      border-bottom: 2px solid #8b3dbc;
      position: relative;
      z-index: 10;
    }
    .obj-header h2 {
      flex: 1;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin: 0;
      color: #fff;
    }
    .obj-back-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }
    .obj-add-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 1.3rem;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Body scrollable ── */
    .obj-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 80px;
      display: flex;
      flex-direction: column;
      gap: var(--obj-gap);
    }

    /* ── Objectif Card ── */
    .obj-card {
      border-radius: var(--obj-radius);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      background: rgba(255,255,255,0.03);
    }
    .obj-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }
    .obj-color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .obj-title-wrap {
      flex: 1;
      min-width: 0;
    }
    .obj-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #f0e8d8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .obj-meta {
      font-size: 0.72rem;
      color: rgba(200,190,175,0.5);
      margin-top: 2px;
    }
    .obj-progress-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .obj-progress-badge.done { color: #4ade80; background: rgba(74,222,128,0.12); }
    .obj-progress-badge.mid  { color: #fbbf24; background: rgba(251,191,36,0.12); }
    .obj-progress-badge.low  { color: #f87171; background: rgba(248,113,113,0.12); }

    .obj-chevron {
      font-size: 1rem;
      color: rgba(200,190,175,0.4);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .obj-card.open .obj-chevron { transform: rotate(90deg); }

    /* ── Progress Bar ── */
    .obj-progress-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.06);
    }
    .obj-progress-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Plans List ── */
    .obj-plans {
      display: none;
      padding: 6px 14px 14px;
      flex-direction: column;
      gap: 8px;
    }
    .obj-card.open .obj-plans { display: flex; }

    .plan-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px;
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .plan-item.plan-success {
      border-color: rgba(74,222,128,0.25);
      background: rgba(74,222,128,0.05);
    }
    .plan-item.plan-fail {
      border-color: rgba(248,113,113,0.2);
      background: rgba(248,113,113,0.04);
      opacity: 0.6;
    }
    .plan-body {
      flex: 1;
      min-width: 0;
    }
    .plan-text {
      font-size: 0.875rem;
      line-height: 1.4;
      color: #ddd8cc;
    }
    .plan-item.plan-success .plan-text { text-decoration: line-through; color: #6ee7b7; }
    .plan-date {
      font-size: 0.7rem;
      color: rgba(200,190,175,0.45);
      margin-top: 3px;
    }
    .plan-proof-btn {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      opacity: 0.55;
      transition: opacity 0.2s;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .plan-proof-btn:hover { opacity: 1; }
    .plan-proof-btn.has-proof { opacity: 1; }
    .plan-proof-img {
      display: block;
      margin-top: 8px;
      max-width: 100%;
      max-height: 160px;
      border-radius: 7px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .plan-actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
      align-items: flex-start;
      margin-top: 2px;
    }
    .plan-btn {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }
    .plan-btn:hover { opacity: 0.8; }
    .plan-btn.check  { background: rgba(74,222,128,0.18); color: #4ade80; }
    .plan-btn.fail   { background: rgba(248,113,113,0.18); color: #f87171; }
    .plan-btn.cancel { background: rgba(200,190,175,0.12); color: #b0a898; }

    /* ── Add Plan Button ── */
    .add-plan-btn {
      margin-top: 4px;
      width: 100%;
      padding: 9px;
      border-radius: 9px;
      border: 1px dashed rgba(255,255,255,0.18);
      background: none;
      color: rgba(200,190,175,0.5);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Rajdhani', sans-serif;
    }
    .add-plan-btn:hover { border-color: rgba(255,255,255,0.35); color: #d0c8b8; }

    /* ── Obj Actions ── */
    .obj-card-actions {
      display: none;
      padding: 0 14px 12px;
      gap: 8px;
    }
    .obj-card.open .obj-card-actions { display: flex; }
    .obj-edit-btn, .obj-del-btn {
      flex: 1;
      padding: 7px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
    }
    .obj-edit-btn { color: #a0c4ff; }
    .obj-del-btn  { color: #f87171; }

    /* ── Empty State ── */
    .obj-empty {
      text-align: center;
      color: rgba(200,190,175,0.35);
      padding: 60px 20px;
      font-size: 0.88rem;
      line-height: 1.8;
    }
    .obj-empty .obj-empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* ── Overlays ── */
    .obj-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .obj-overlay.hidden { display: none; }
    .obj-panel {
      background: #13111a;
      border-radius: 18px 18px 0 0;
      border-top: 2px solid #8b3dbc;
      width: 100%;
      max-width: 520px;
      padding: 20px 18px 36px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .obj-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .obj-panel-header h3 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin: 0;
    }
    .obj-panel-close {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 7px;
      color: #fff;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .obj-form-label {
      font-size: 0.78rem;
      color: rgba(200,190,175,0.6);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .obj-form-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 9px;
      color: #e8e0d0;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: 'Rajdhani', sans-serif;
      box-sizing: border-box;
      outline: none;
    }
    .obj-form-input:focus {
      border-color: #8b3dbc;
    }
    .obj-color-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .obj-color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
    }
    .obj-color-swatch.selected {
      border-color: #fff;
      transform: scale(1.15);
    }
    .obj-submit-btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #8b3dbc, #5a1d8a);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-top: 4px;
    }

    /* ── Proof overlay ── */
    .proof-full-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .proof-full-overlay.hidden { display: none; }
    .proof-full-img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 10px;
      object-fit: contain;
    }
    .proof-full-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .proof-upload-bar {
      position: absolute;
      bottom: 20px;
      display: flex;
      gap: 10px;
    }
    .proof-upload-btn {
      background: rgba(139,61,188,0.8);
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 9px 18px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
    }

    /* Toast local (si standalone) */
    .obj-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20,15,30,0.95);
      border: 1px solid rgba(139,61,188,0.5);
      color: #e8e0d0;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 0.85rem;
      z-index: 400;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .obj-toast.hidden { opacity: 0; }
  </style>
</head>
<body>

<div id="objektifScreen">
  <!-- Header -->
  <div class="obj-header">
    <button class="obj-back-btn" onclick="objGoBack()">‹</button>
    <h2>Plan d'action</h2>
    <button class="obj-add-btn" onclick="openObjForm()">+</button>
  </div>

  <!-- Body -->
  <div class="obj-body" id="objBody">
    <div class="obj-empty">
      <div class="obj-empty-icon">🎯</div>
      <div>Okenn objektif ankò.<br>Peze <b>+</b> pou kreye premye a.</div>
    </div>
  </div>
</div>

<!-- ── Formulaire Objectif ── -->
<div id="objFormOverlay" class="obj-overlay hidden">
  <div class="obj-panel">
    <div class="obj-panel-header">
      <h3 id="objFormTitle">Nouvo Objektif</h3>
      <button class="obj-panel-close" onclick="closeObjForm()">✕</button>
    </div>
    <input type="hidden" id="objEditId" />
    <div>
      <div class="obj-form-label">Tit objektif la *</div>
      <input type="text" id="objTitleInput" class="obj-form-input" placeholder="Eks: Devlope paj Facebook mwen" />
    </div>
    <div>
      <div class="obj-form-label">Koulè</div>
      <div class="obj-color-row" id="objColorRow"></div>
    </div>
    <button class="obj-submit-btn" onclick="saveObjectif()">💾 Anrejistre</button>
  </div>
</div>

<!-- ── Formulaire Plan ── -->
<div id="planFormOverlay" class="obj-overlay hidden">
  <div class="obj-panel">
    <div class="obj-panel-header">
      <h3>Ajoute yon Plan</h3>
      <button class="obj-panel-close" onclick="closePlanForm()">✕</button>
    </div>
    <input type="hidden" id="planObjId" />
    <div>
      <div class="obj-form-label">Deskripsyon plan an *</div>
      <input type="text" id="planTextInput" class="obj-form-input" placeholder="Eks: Kreye kontni chak jou pandan 1 semèn" />
    </div>
    <div>
      <div class="obj-form-label">Dat limit souhaitab</div>
      <input type="date" id="planDateInput" class="obj-form-input" />
    </div>
    <button class="obj-submit-btn" onclick="savePlan()">➕ Ajoute Plan</button>
  </div>
</div>

<!-- ── Preuve visuelle ── -->
<div id="proofOverlay" class="proof-full-overlay hidden">
  <button class="proof-full-close" onclick="closeProofOverlay()">✕ Fèmen</button>
  <img id="proofFullImg" class="proof-full-img" src="" alt="Prèv" style="display:none;" />
  <div id="proofNoImg" style="color:rgba(255,255,255,0.5);font-size:0.9rem;text-align:center;">
    Okenn foto prèv ankò.
  </div>
  <div class="proof-upload-bar">
    <button class="proof-upload-btn" onclick="document.getElementById('proofFileInput').click()">
      📷 Chwazi foto
    </button>
    <button class="proof-upload-btn" id="proofDeleteBtn" onclick="deleteProof()" style="background:rgba(248,113,113,0.6);display:none;">
      🗑 Efase
    </button>
  </div>
  <input type="file" id="proofFileInput" accept="image/*" onchange="uploadProof(this)" hidden />
</div>
<input type="hidden" id="proofObjId" />
<input type="hidden" id="proofPlanId" />

<!-- Toast local -->
<div id="objToast" class="obj-toast hidden"></div>

<script src="app.js"></script>
<script src="objektif.js"></script>
</body>
</html>
